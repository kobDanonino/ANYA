<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Moonlight Staff - Comandos</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #010118, #0a0a2a, #000018);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Estrellas fugaces blancas */
        .shooting-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .star-trail {
            position: absolute;
            width: 4px;
            height: 100px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 1), rgba(255, 255, 255, 0));
            border-radius: 50%;
            animation: shoot 2.5s linear forwards;
            opacity: 0;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0) rotate(35deg);
                opacity: 1;
            }
            100% {
                transform: translateX(350px) translateY(350px) rotate(35deg);
                opacity: 0;
            }
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-fixed {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            background: rgba(10, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .categories-nav {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 10px 16px;
            margin-bottom: 30px;
            overflow-x: auto;
            white-space: nowrap;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .categories-nav::-webkit-scrollbar {
            height: 4px;
        }
        .categories-nav::-webkit-scrollbar-track { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .categories-nav::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }

        .category-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 18px;
            margin: 0 4px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-btn.active {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            font-weight: bold;
        }

        .commands-content {
            background: rgba(10, 20, 50, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            min-height: 500px;
        }

        .category-title {
            color: #60a5fa;
            font-size: 1.6rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(59, 130, 246, 0.4);
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        .command-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 10px 14px;
            border-left: 3px solid #3b82f6;
            transition: all 0.2s ease;
        }

        .command-item:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: translateX(3px);
        }

        .command-name {
            color: #60a5fa;
            font-weight: 600;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .command-aliases {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            margin-top: 4px;
        }

        .back-btn {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 25px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: all 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.97);
        }

        .center {
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart {
            color: #ff6b6b;
        }

        @media (max-width: 768px) {
            .commands-grid { grid-template-columns: 1fr; }
            .category-title { font-size: 1.3rem; }
            .glow-text { font-size: 1.2rem; }
            .avatar { width: 48px; height: 48px; }
            .commands-content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="shooting-stars" id="shootingStars"></div>
    <div class="stars-bg" id="starsBg"></div>
    <div class="nebula-space"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="categories-nav" id="categoriesNav">
            <button class="category-btn active" data-cat="info">Información</button>
            <button class="category-btn" data-cat="download">Download</button>
            <button class="category-btn" data-cat="admin">Administración</button>
            <button class="category-btn" data-cat="subbots">Sub-Bots</button>
            <button class="category-btn" data-cat="tools">Tools</button>
            <button class="category-btn" data-cat="imagenes">Imágenes</button>
            <button class="category-btn" data-cat="search">Search</button>
            <button class="category-btn" data-cat="stickers">Stickers</button>
            <button class="category-btn" data-cat="rpg">RPG</button>
            <button class="category-btn" data-cat="reacciones">Reacciones</button>
            <button class="category-btn" data-cat="economy">Economy</button>
        </div>

        <div class="commands-content" id="commandsContent"></div>

        <div class="center">
            <a href="index.html" class="back-btn">← Volver al inicio</a>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
        </div>
    </div>

    <script>
        const comandosData = {
            info: { nombre: "Información", comandos: [
                { principal: "❀ commands", alias: "help | menu" }, { principal: "❀ botinfo", alias: "infobot" }, { principal: "❀ level", alias: "lvl" }, { principal: "❀ ping", alias: "speed | p" }, { principal: "❀ status", alias: "estado | system" }, { principal: "❀ uptime", alias: "activo | tiempo" }, { principal: "❀ suggest", alias: "sugerencia" }, { principal: "❀ report", alias: "reporte" }, { principal: "❀ creador", alias: "owner" }, { principal: "❀ top", alias: "ranking" }, { principal: "❀ reportuser", alias: "" }, { principal: "❀ totalfunciones", alias: "totalcmd" }
            ] },
            download: { nombre: "Download", comandos: [
                { principal: "❀ play", alias: "playaudio | ytplay" }, { principal: "❀ ig", alias: "instagram | reel" }, { principal: "❀ fb", alias: "facebook | face" }, { principal: "❀ twitter", alias: "tw | x" }, { principal: "❀ tt", alias: "tiktok" }, { principal: "❀ playdoc", alias: "mp4doc | ytdoc" }, { principal: "❀ gitclone", alias: "github | git | clonar" }, { principal: "❀ tiktoksearch2", alias: "ttsearch2" }
            ] },
            admin: { nombre: "Administración", comandos: [
                { principal: "❀ demote", alias: "" }, { principal: "❀ promote", alias: "" }, { principal: "❀ close", alias: "cerrar | cerrargrupo" }, { principal: "❀ open", alias: "abrir | abrirgrupo" }, { principal: "❀ kick", alias: "echar | ban" }, { principal: "❀ setgpname", alias: "" }, { principal: "❀ tag", alias: "tagsay" }, { principal: "❀ delwarn", alias: "" }, { principal: "❀ warns", alias: "" }, { principal: "❀ listadmin", alias: "" }, { principal: "❀ link", alias: "enlace | invite" }, { principal: "❀ invocar", alias: "tagall" }, { principal: "❀ ruleta", alias: "" }, { principal: "❀ onlyadmin", alias: "" }, { principal: "❀ bot", alias: "" }, { principal: "❀ setprimary", alias: "setprimario" }, { principal: "❀ delprimary", alias: "eliminarprimario | removeprimary" }, { principal: "❀ getprimary", alias: "botprimario | verprimario" }
            ] },
            subbots: { nombre: "Sub-Bots", comandos: [
                { principal: "❀ serbot", alias: "serbotlight" }, { principal: "❀ setpfp", alias: "cambiarfoto | setfoto" }, { principal: "❀ setusername", alias: "setbotname" }, { principal: "❀ leave", alias: "salir" }, { principal: "❀ join", alias: "unir | entrar" }, { principal: "❀ code", alias: "jadibot" }, { principal: "❀ bots", alias: "sockets | listbots" }, { principal: "❀ setbanner", alias: "cambiarbanner" }, { principal: "❀ seticon", alias: "seticono" }, { principal: "❀ setname", alias: "setnombre" }
            ] },
            tools: { nombre: "Tools", comandos: [
                { principal: "❀ infoanime", alias: "animeinfo" }, { principal: "❀ pfp", alias: "profilepic" }, { principal: "❀ traducir", alias: "translate | traductor | tl" }, { principal: "❀ tomp3", alias: "toaudio" }, { principal: "❀ pn", alias: "numero | telefono" }, { principal: "❀ lid", alias: "id | userid" }
            ] },
            imagenes: { nombre: "Imágenes", comandos: [
                { principal: "❀ waifu", alias: "" }, { principal: "❀ neko", alias: "" }, { principal: "❀ imagen", alias: "" }, { principal: "❀ pin", alias: "pinterest" }
            ] },
            search: { nombre: "Search", comandos: [
                { principal: "❀ tiktoksearch", alias: "ttsearch | tiktoks | tts" }, { principal: "❀ ytsearch", alias: "yts | youtubesearch" }, { principal: "❀ tiktokstats", alias: "ttstats | tiktokstalk | ttstalk" }, { principal: "❀ wikipedia", alias: "wiki" }, { principal: "❀ tiktoksearch2", alias: "ttsearch2" }
            ] },
            stickers: { nombre: "Stickers", comandos: [
                { principal: "❀ toimg", alias: "toimage" }, { principal: "❀ s", alias: "sticker" }, { principal: "❀ setmeta", alias: "" }, { principal: "❀ brat", alias: "" }, { principal: "❀ bratv", alias: "" }, { principal: "❀ qc", alias: "quote | quotly" }
            ] },
            rpg: { nombre: "RPG", comandos: [
                { principal: "❀ gay", alias: "gaymeter | gaylevel" }, { principal: "❀ femboy", alias: "fem" }, { principal: "❀ lesbiana", alias: "les" }, { principal: "❀ furro", alias: "furry" }, { principal: "❀ therian", alias: "therianmeter" }, { principal: "❀ migajero", alias: "" }, { principal: "❀ top2", alias: "" }, { principal: "❀ facto", alias: "factos" }, { principal: "❀ formarpareja", alias: "formarparejas | shippear" }, { principal: "❀ ship", alias: "love | calcularamor" }, { principal: "❀ pvp", alias: "fight" }
            ] },
            reacciones: { nombre: "Reacciones", comandos: [
                { principal: "❀ rogar", alias: "" }, { principal: "❀ ñam", alias: "" }, { principal: "❀ eat", alias: "" }, { principal: "❀ pat", alias: "" }, { principal: "❀ sad", alias: "" }, { principal: "❀ kiss", alias: "" }, { principal: "❀ kisscheek", alias: "" }
            ] },
            economy: { nombre: "Economy", comandos: [
                { principal: "❀ bank", alias: "inventario | balance | bal" }, { principal: "❀ heal", alias: "curar | cure | recuperar" }, { principal: "❀ minar", alias: "mine | mineria" }, { principal: "❀ trabajar", alias: "work | trabajo" }, { principal: "❀ crimen", alias: "crime | robar" }, { principal: "❀ buy", alias: "comprar | vender | trade | cambiar" }, { principal: "❀ aventura", alias: "adventure | explorar" }, { principal: "❀ claim", alias: "daily | recompensa" }, { principal: "❀ cofre", alias: "chest | caja | tesoro" }, { principal: "❀ rt", alias: "ruleta | roulette | rojo | negro | red | black" }, { principal: "❀ cf", alias: "caraocruz | coinflip" }, { principal: "❀ suerte", alias: "luck | azar | random" }, { principal: "❀ pay", alias: "pagar | transferir | enviar" }, { principal: "❀ cazar", alias: "hunt | caza" }, { principal: "❀ pescar", alias: "fish | pesca" }, { principal: "❀ excavar", alias: "dig | excavacion" }, { principal: "❀ tesoro", alias: "treasure | buscar" }, { principal: "❀ reciclar", alias: "recycle | reciclaje" }, { principal: "❀ mina2", alias: "minaprofund | deepmine" }, { principal: "❀ mina3", alias: "minaencantada | magicmine" }, { principal: "❀ comerciante", alias: "trader | mercader" }, { principal: "❀ descansar", alias: "rest | meditar" }, { principal: "❀ canjear", alias: "redeem | usarcode" }
            ] }
        };

        function renderizarComandos(categoria) {
            const data = comandosData[categoria];
            if (!data) return;
            let html = `<div class="category-title">${data.nombre}</div><div class="commands-grid">`;
            data.comandos.forEach(cmd => {
                html += `<div class="command-item"><div class="command-name">${cmd.principal}</div>${cmd.alias ? `<div class="command-aliases">${cmd.alias}</div>` : ''}</div>`;
            });
            html += `</div>`;
            document.getElementById('commandsContent').innerHTML = html;
        }

        const buttons = document.querySelectorAll('.category-btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderizarComandos(btn.getAttribute('data-cat'));
            });
        });
        renderizarComandos('info');

        // Estrellas fijas
        function crearEstrellasFijas() {
            const container = document.getElementById('starsBg');
            if (!container) return;
            for (let i = 0; i < 250; i++) {
                const star = document.createElement('div');
                star.classList.add('star-fixed');
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }

        // Estrellas fugaces
        function crearEstrellaFugaz() {
            const container = document.getElementById('shootingStars');
            const star = document.createElement('div');
            star.classList.add('star-trail');
            star.style.left = `${Math.random() * 80 + 10}%`;
            star.style.top = `${Math.random() * 40}%`;
            star.style.animationDuration = `${Math.random() * 2 + 1.8}s`;
            container.appendChild(star);
            setTimeout(() => star.remove(), 3000);
        }

        crearEstrellasFijas();
        setInterval(() => crearEstrellaFugaz(), 2500);
        for (let i = 0; i < 5; i++) setTimeout(() => crearEstrellaFugaz(), i * 500);
    </script>
</body>
</html>
