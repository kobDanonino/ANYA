        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a2e, #16213e);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Contenedor de estrellas fugaces */
        .shooting-stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        /* Estrella fugaz - BLANCA, GRANDE Y BRILLANTE */
        .star-trail {
            position: absolute;
            width: 4px;
            height: 120px;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 1) 0%,
                rgba(255, 255, 255, 0.8) 30%,
                rgba(255, 255, 255, 0.4) 60%,
                rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            filter: blur(1px);
            animation: shoot 2.5s linear forwards;
            opacity: 0;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* Estrella fugaz más grande (variante) */
        .star-trail-large {
            position: absolute;
            width: 6px;
            height: 180px;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 1) 0%,
                rgba(255, 255, 255, 0.8) 30%,
                rgba(255, 255, 255, 0.4) 60%,
                rgba(255, 255, 255, 0) 100%);
            border-radius: 50%;
            filter: blur(2px);
            animation: shoot 3s linear forwards;
            opacity: 0;
            box-shadow: 0 0 20px rgba(255, 255, 255, 1);
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0) rotate(35deg);
                opacity: 1;
            }
            70% {
                opacity: 0.9;
            }
            100% {
                transform: translateX(400px) translateY(400px) rotate(35deg);
                opacity: 0;
            }
        }

        /* Estrellas fijas de fondo - BLANCAS Y GRANDES */
        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-fixed {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle 2s infinite alternate;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
        }

        .star-fixed.medium {
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.8);
        }

        .star-fixed.large {
            box-shadow: 0 0 20px rgba(255, 255, 255, 1);
        }

        @keyframes twinkle {
            0% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        /* Partículas de estrellas brillantes */
        .star-dust {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: floatDust 12s infinite linear;
            z-index: 0;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
        }

        @keyframes floatDust {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) translateX(50px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Estrellas centelleantes adicionales */
        .twinkling-star {
            position: fixed;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: twinkleFast 1.5s infinite alternate;
            z-index: 0;
        }

        @keyframes twinkleFast {
            0% {
                opacity: 0.3;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Banner */
        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .banner:hover {
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px);
        }

        .avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);

        .glow-text {

            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00, #fff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
            letter-spacing: 1px;
        }

        @keyframes shine {
            0% { background-position: 0% center; }

            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .categories-nav::-webkit-scrollbar {

        }

        .categories-nav::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .categories-nav::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        .category-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #1e1a2f;
            font-weight: bold;
        }

        /* Contenido de comandos */
        .commands-content {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            min-height: 500px;
        }

        .category-title {
            color: #ffd700;
            font-size: 1.8rem;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
            font-weight: 600;
        }

        .commands-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .command-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 12px 15px;
            border-left: 3px solid #ffd700;
            transition: all 0.2s ease;
        }

        .command-item:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: translateX(5px);
            border-left-width: 5px;
        }

        .command-name {
            color: #ffd700;
            font-weight: 600;
            font-family: monospace;
            font-size: 0.95rem;
        }

        .command-aliases {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            margin-top: 5px;

        .back-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 30px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .center {
            text-align: center;

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }

        @media (max-width: 768px) {
            .commands-grid {
                grid-template-columns: 1fr;
            }
            .category-title {
                font-size: 1.4rem;
            }
            .glow-text {
                font-size: 1.2rem;
            }
            .avatar {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>

        // Función para renderizar comandos
        function renderizarComandos(categoria) {
            const data = comandosData[categoria];
            if (!data) return;

            let html = `
                <div class="category-title">${data.nombre}</div>
                <div class="commands-grid">
            `;

            data.comandos.forEach(cmd => {
                html += `
                    <div class="command-item">
                        <div class="command-name">${cmd.principal}</div>
                        ${cmd.alias ? `<div class="command-aliases">${cmd.alias}</div>` : ''}
                    </div>
                `;
            });

            html += `</div>`;
            document.getElementById('commandsContent').innerHTML = html;
        }

        // Configurar navegación
        const buttons = document.querySelectorAll('.category-btn');
        
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                buttons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const categoria = btn.getAttribute('data-cat');
                renderizarComandos(categoria);
            });
        });

        // Renderizar categoría inicial
        renderizarComandos('info');

        // ========== LLUVIA DE ESTRELLAS BLANCAS Y GRANDES ==========
        
        // Estrellas fijas de fondo (muchas y de diferentes tamaños)
        function crearEstrellasFijas() {
            const starsContainer = document.getElementById('starsBg');
            const numEstrellas = 400; // Muchas estrellas
            
            for (let i = 0; i < numEstrellas; i++) {
                const star = document.createElement('div');
                star.classList.add('star-fixed');
                
                // Tamaños variados: pequeñas, medianas y grandes
                const rand = Math.random();
                let size;
                if (rand < 0.6) {
                    size = Math.random() * 2 + 1; // pequeñas: 1-3px
                    star.classList.add('small');
                } else if (rand < 0.85) {
                    size = Math.random() * 3 + 3; // medianas: 3-6px
                    star.classList.add('medium');
                } else {
                    size = Math.random() * 4 + 6; // grandes: 6-10px
                    star.classList.add('large');
                }
                
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                star.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
                starsContainer.appendChild(star);
            }
        }

        // Estrellas fugaces (blancas, grandes, muchas)
        function crearEstrellaFugaz() {
            const container = document.getElementById('shootingStars');
            
            // 70% de probabilidad de ser normal, 30% de ser más grande
            const isLarge = Math.random() < 0.3;
            const star = document.createElement('div');
            star.classList.add(isLarge ? 'star-trail-large' : 'star-trail');
            
            // Posiciones aleatorias por toda la pantalla
            const startX = Math.random() * 90 + 5;
            const startY = Math.random() * 60;
            const duration = isLarge ? (Math.random() * 2 + 2.5) : (Math.random() * 1.5 + 1.8);
            
            star.style.left = `${startX}%`;
            star.style.top = `${startY}%`;
            star.style.animationDuration = `${duration}s`;
            star.style.animationDelay = `0s`;
            
            container.appendChild(star);
            
            setTimeout(() => {
                star.remove();
            }, duration * 1000);
        }

        // Partículas de polvo de estrellas (muchas)
        function crearPolvoEstrellas() {
            const numParticulas = 150;
            
            for (let i = 0; i < numParticulas; i++) {
                const dust = document.createElement('div');
                dust.classList.add('star-dust');
                const size = Math.random() * 4 + 1; // 1-5px
                dust.style.width = `${size}px`;
                dust.style.height = `${size}px`;
                dust.style.left = `${Math.random() * 100}%`;
                dust.style.animationDelay = `${Math.random() * 20}s`;
                dust.style.animationDuration = `${Math.random() * 15 + 10}s`;
                document.body.appendChild(dust);
            }
        }

        // Estrellas centelleantes adicionales
        function crearEstrellasCentelleantes() {
            const numCentelleantes = 100;
            
            for (let i = 0; i < numCentelleantes; i++) {
                const star = document.createElement('div');
                star.classList.add('twinkling-star');
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 3}s`;
                star.style.animationDuration = `${Math.random() * 1.5 + 0.8}s`;
                document.body.appendChild(star);
            }
        }

        // Generar todo
        crearEstrellasFijas();
        crearPolvoEstrellas();
        crearEstrellasCentelleantes();
        
        // Generar muchas estrellas fugaces cada cierto tiempo
        let fugazInterval = setInterval(() => {
            // Generar entre 1 y 3 estrellas fugaces por vez
            const numFugaces = Math.floor(Math.random() * 3) + 2;
            for (let i = 0; i < numFugaces; i++) {
                setTimeout(() => crearEstrellaFugaz(), i * 200);
            }
        }, 1800);
        
        // Generar algunas al inicio
        for (let i = 0; i < 12; i++) {
            setTimeout(() => crearEstrellaFugaz(), i * 300);
        }
    </script>
</body>
</html>
