<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff - Staff</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .glow-text {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #ffd700, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .staff-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .section-title {
            color: #ffd700;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .section-title span {
            font-size: 1.8rem;
        }

        /* Barras decorativas para miembros */
        .miembro-item {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #ffd700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .miembro-icon {
            font-size: 1.5rem;
        }

        .miembro-info {
            flex: 1;
        }

        .miembro-rol {
            color: #ffd700;
            font-weight: bold;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .miembro-nombre {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            margin-top: 3px;
        }

        /* Mensaje de unirse al staff */
        .join-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .join-text {
            color: white;
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .join-text span {
            color: #ffd700;
            font-weight: bold;
        }

        .btn-contactar {
            display: inline-block;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
            margin-top: 10px;
        }

        .btn-contactar:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.5);
        }

        .back-btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .center {
            text-align: center;
            margin-top: 20px;
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">✨ Moonlight Staff ✨</span>
        </div>

        <div class="staff-card">
            <div class="section-title">
                <span>👥</span> EQUIPO STAFF <span>⭐</span>
            </div>

            <!-- Creador -->
            <div class="miembro-item">
                <div class="miembro-icon">👑</div>
                <div class="miembro-info">
                    <div class="miembro-rol">✩ CREADOR</div>
                    <div class="miembro-nombre">StarLyn</div>
                </div>
            </div>

            <!-- Moderadores -->
            <div class="miembro-item">
                <div class="miembro-icon">🛡️</div>
                <div class="miembro-info">
                    <div class="miembro-rol">✩ MODERADOR</div>
                    <div class="miembro-nombre">xOne</div>
                </div>
            </div>

            <div class="miembro-item">
                <div class="miembro-icon">🛡️</div>
                <div class="miembro-info">
                    <div class="miembro-rol">✩ MODERADOR</div>
                    <div class="miembro-nombre">Edwin</div>
                </div>
            </div>

            <div class="miembro-item">
                <div class="miembro-icon">🛡️</div>
                <div class="miembro-info">
                    <div class="miembro-rol">✩ MODERADOR</div>
                    <div class="miembro-nombre">Ariel</div>
                </div>
            </div>

            <!-- Sección para unirse al staff -->
            <div class="join-section">
                <div class="join-text">
                    🌟 ¿Quieres ser parte del <span>Moonlight Staff</span>? 🌟
                </div>
                <a href="https://wa.me/529992042946?text=Hola%2C%20me%20interesa%20formar%20parte%20del%20staff" 
                   class="btn-contactar" 
                   target="_blank">
                    📩 Contactar
                </a>
            </div>
        </div>

        <div class="center">
            <a href="index.html" class="back-btn">← Volver al inicio</a>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> para Moonlight Staff</p>
        </div>
    </div>
</body>
</html>
