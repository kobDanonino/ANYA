<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Moonlight Staff - Staff</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #010118, #0a0a2a, #000018);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .stars-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-big {
            position: absolute;
            background: #aaccff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkleSpace 2s infinite alternate;
        }

        .star-small {
            position: absolute;
            background: #88aaff;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkleSpace 3s infinite alternate;
        }

        @keyframes twinkleSpace {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            background: rgba(10, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .staff-card {
            background: rgba(10, 20, 50, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 35px 28px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .section-title {
            color: #60a5fa;
            font-size: 1.4rem;
            text-align: center;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .miembro-item {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 12px;
            border-left: 3px solid #3b82f6;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        .miembro-item:hover {
            background: rgba(0, 0, 0, 0.6);
            transform: translateX(3px);
        }

        .miembro-icon { font-size: 1.4rem; }
        .miembro-rol { color: #60a5fa; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }
        .miembro-nombre { color: white; font-size: 1rem; font-weight: bold; margin-top: 3px; }

        .join-section {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin-top: 25px;
            text-align: center;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .join-text { color: white; margin-bottom: 15px; font-size: 0.9rem; }
        .join-text span { color: #60a5fa; font-weight: bold; }

        .btn-contactar {
            display: inline-block;
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-contactar:active { transform: scale(0.97); }

        .back-btn {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 25px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: all 0.2s ease;
        }

        .back-btn:active { transform: scale(0.97); }

        .center { text-align: center; }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart { color: #ff6b6b; }

        @media (max-width: 550px) {
            .staff-card { padding: 25px 18px; }
            .glow-text { font-size: 1.2rem; }
            .avatar { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>
    <div class="stars-space" id="starsSpace"></div>
    <div class="nebula-space"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="staff-card">
            <div class="section-title"><span>👥</span> EQUIPO STAFF <span>⭐</span></div>

            <div class="miembro-item"><div class="miembro-icon">👑</div><div><div class="miembro-rol">✩ CREADOR</div><div class="miembro-nombre">StarLyn</div></div></div>
            <div class="miembro-item"><div class="miembro-icon">🛡️</div><div><div class="miembro-rol">✩ MODERADOR</div><div class="miembro-nombre">xOne</div></div></div>
            <div class="miembro-item"><div class="miembro-icon">🛡️</div><div><div class="miembro-rol">✩ MODERADOR</div><div class="miembro-nombre">Edwin</div></div></div>
            <div class="miembro-item"><div class="miembro-icon">🛡️</div><div><div class="miembro-rol">✩ MODERADOR</div><div class="miembro-nombre">Ariel</div></div></div>

            <div class="join-section">
                <div class="join-text">🌟 ¿Quieres ser parte del <span>Moonlight Staff</span>? 🌟</div>
                <a href="https://wa.me/529992042946?text=Hola%2C%20me%20interesa%20formar%20parte%20del%20staff" class="btn-contactar" target="_blank">Contactar</a>
            </div>
        </div>

        <div class="center"><a href="index.html" class="back-btn">← Volver al inicio</a></div>
        <div class="footer"><p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p></div>
    </div>

    <script>
        function crearEstrellas() {
            const container = document.getElementById('starsSpace');
            if (!container) return;
            for (let i = 0; i < 180; i++) {
                const isBig = Math.random() < 0.2;
                const star = document.createElement('div');
                star.classList.add(isBig ? 'star-big' : 'star-small');
                const size = isBig ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }
        crearEstrellas();
    </script>
</body>
</html>
