<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .glow-text {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #ffd700, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Hora local - Arriba de los botones */
        .hora-mx {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 10px 20px;
            margin-bottom: 25px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            color: #ffd700;
            font-size: 0.9rem;
        }

        .hora-mx span:first-child {
            font-size: 1.2rem;
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 12px;
            border-radius: 50px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 80%;
            text-align: center;
        }

        .btn-info {
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .btn-custom {
            background: linear-gradient(45deg, #f59e0b, #d97706);
        }

        .btn-staff {
            background: linear-gradient(45deg, #ef4444, #dc2626);
        }

        .btn-registro {
            background: linear-gradient(45deg, #3b82f6, #1e40af);
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">✨ Moonlight Staff ✨</span>
        </div>

        <div class="main-card">
            <h1>✨ Bienvenido(a) a Moonlight Staff ✨</h1>
            
            <!-- Hora local de Mérida, Yucatán (arriba de los botones) -->
            <div class="hora-mx">
                <span>🇲🇽</span>
                <span>Mérida, Yucatán:</span>
                <span id="hora">--:--:--</span>
            </div>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn" target="_blank">
                    📱 Channel
                </a>
                <a href="info.html" class="btn btn-info">
                    ℹ️ Información
                </a>
                <a href="custom.html" class="btn btn-custom">
                    ⚙️ Personalizar
                </a>
                <a href="staff.html" class="btn btn-staff">
                    👥 Staff
                </a>
                <a href="registro.html" class="btn btn-registro">
                    📝 Registro
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> para Moonlight Staff</p>
        </div>
    </div>

    <script>
        // ========== HORA LOCAL DE MÉRIDA, YUCATÁN ==========
        function actualizarHoraMerida() {
            const ahora = new Date();
            
            const opciones = {
                timeZone: 'America/Merida',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const horaMerida = ahora.toLocaleTimeString('es-MX', opciones);
            document.getElementById('hora').textContent = horaMerida;
        }
        
        actualizarHoraMerida();
        setInterval(actualizarHoraMerida, 1000);
    </script>
</body>
</html>
