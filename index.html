<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #030014, #0a0a1a, #000000);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fondo espacial con estrellas */
        .stars-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-big {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.7;
            animation: twinkleSpace 2s infinite alternate;
            box-shadow: 0 0 5px rgba(255,255,255,0.5);
        }

        .star-small {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkleSpace 3s infinite alternate;
        }

        @keyframes twinkleSpace {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Nebulosa espacial */
        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(100, 80, 200, 0.1), transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 680px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Banner espacial */
        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            background: rgba(10, 10, 30, 0.5);
            backdrop-filter: blur(15px);
            padding: 15px 25px;
            border-radius: 100px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .banner:hover {
            border-color: rgba(255, 215, 0, 0.7);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            transform: translateY(-2px);
        }

        .avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        .glow-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }

        /* Tarjeta principal */
        .main-card {
            background: rgba(10, 10, 30, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            letter-spacing: 1px;
        }

        /* Contenedor de hora y estado */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }

        /* Hora espacial */
        .hora-mx {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 10px 24px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(100, 150, 255, 0.4);
        }

        .hora-mx span:first-child {
            font-size: 1.2rem;
        }

        .hora-mx span:nth-child(2) {
            color: #a0a0c0;
            font-weight: 400;
            font-size: 0.9rem;
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 14px;
            border-radius: 50px;
            letter-spacing: 1px;
            color: #7aa2f7;
        }

        /* Puntitos verdes sutiles */
        .active-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: transparent;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #22c55e;
            opacity: 0.4;
            transition: all 0.1s ease;
        }

        .dot.active {
            opacity: 1;
            background-color: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            animation: dotFlash 0.3s ease;
        }

        @keyframes dotFlash {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.5); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            color: #4ade80;
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            opacity: 0.8;
        }

        /* Botones con diseño de estrellas */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 85%;
            text-align: center;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(20, 20, 50, 0.6);
            letter-spacing: 0.5px;
        }

        /* Efecto de estrellas al hover */
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.6), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.5s ease, height 0.5s ease;
            pointer-events: none;
        }

        .btn:hover::before {
            width: 200px;
            height: 200px;
        }

        .btn:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.8);
            background: rgba(30, 30, 70, 0.8);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* Iconos dentro de los botones */
        .btn-icon {
            margin-right: 8px;
            font-size: 1.1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart {
            color: #ff6b6b;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .main-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.4rem;
            }
            
            .glow-text {
                font-size: 1.2rem;
            }
            
            .avatar {
                width: 50px;
                height: 50px;
            }
            
            .btn {
                width: 95%;
                font-size: 0.9rem;
                padding: 10px 16px;
            }
            
            #hora {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Fondo espacial -->
    <div class="stars-space" id="starsSpace"></div>
    <div class="nebula-space"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="main-card">
            <h1>✨ Bienvenido(a) a Moonlight Staff ✨</h1>
            
            <div class="status-container">
                <div class="hora-mx">
                    <span>🌙</span>
                    <span>México</span>
                    <span id="hora">--:--:--</span>
                </div>
                
                <!-- Puntitos verdes sutiles -->
                <div class="active-status">
                    <div class="dot" id="dot1"></div>
                    <div class="dot" id="dot2"></div>
                    <div class="dot" id="dot3"></div>
                    <span class="status-text">● activo</span>
                </div>
            </div>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn" target="_blank">
                    <span class="btn-icon"></span> Channel
                </a>
                <a href="info.html" class="btn">
                    <span class="btn-icon"></span> Información
                </a>
                <a href="custom.html" class="btn">
                    <span class="btn-icon"></span> Personalizar
                </a>
                <a href="staff.html" class="btn">
                    <span class="btn-icon"></span> Staff
                </a>
                <a href="registro.html" class="btn">
                    <span class="btn-icon"></span> Registro
                </a>
                <a href="sugerencias.html" class="btn">
                    <span class="btn-icon"></span> Sugerencia
                </a>
                <a href="comandos.html" class="btn">
                    <span class="btn-icon"></span> Comandos
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
            <p style="font-size: 0.65rem; margin-top: 6px;">© 2026 - Moonlight Studios</p>
        </div>
    </div>

    <script>
        // Hora de Mérida
        function actualizarHoraMerida() {
            const ahora = new Date();
            const opciones = {
                timeZone: 'America/Merida',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const horaMerida = ahora.toLocaleTimeString('es-MX', opciones);
            document.getElementById('hora').textContent = horaMerida;
        }
        
        actualizarHoraMerida();
        setInterval(actualizarHoraMerida, 1000);

        // Puntitos verdes animados secuencialmente
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');
        
        let activeIndex = 0;
        const dots = [dot1, dot2, dot3];
        
        function animateDots() {
            dots.forEach(dot => {
                dot.classList.remove('active');
            });
            dots[activeIndex].classList.add('active');
            activeIndex = (activeIndex + 1) % dots.length;
        }
        
        animateDots();
        setInterval(animateDots, 900);

        // Estrellas de fondo espacial
        function crearEstrellasEspaciales() {
            const container = document.getElementById('starsSpace');
            const numEstrellas = 300;
            
            for (let i = 0; i < numEstrellas; i++) {
                const isBig = Math.random() < 0.2;
                const star = document.createElement('div');
                star.classList.add(isBig ? 'star-big' : 'star-small');
                
                const size = isBig ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                star.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
                container.appendChild(star);
            }
        }
        
        crearEstrellasEspaciales();
    </script>
</body>
</html>
