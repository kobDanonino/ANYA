<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a2e, #16213e);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fondo animado premium */
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        /* Partículas flotantes premium */
        .particle-premium {
            position: absolute;
            background: radial-gradient(circle, rgba(255,215,0,0.4), transparent);
            border-radius: 50%;
            pointer-events: none;
            animation: floatPremium 20s infinite linear;
        }

        @keyframes floatPremium {
            0% {
                transform: translateY(100vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-20vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Nebulosa de fondo */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(100, 80, 200, 0.15), transparent 70%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 680px;
            margin: 0 auto;
            animation: fadeInUp 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Banner ultra premium */
        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 18px 30px;
            border-radius: 100px;
            border: 1px solid rgba(255, 215, 0, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 215, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .banner:hover {
            border-color: rgba(255, 215, 0, 0.8);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 215, 0, 0.3);
            transform: translateY(-3px);
        }

        .avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            transition: all 0.4s ease;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
        }

        .glow-text {
            font-size: 1.6rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00, #ffd700, #fff);
            background-size: 400% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shinePremium 5s linear infinite;
            letter-spacing: 2px;
        }

        @keyframes shinePremium {
            0% { background-position: 0% center; }
            100% { background-position: 400% center; }
        }

        /* Tarjeta principal - vidrio premium */
        .main-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border-radius: 50px;
            padding: 45px 35px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
            transition: all 0.4s ease;
        }

        .main-card:hover {
            border-color: rgba(255, 215, 0, 0.4);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: white;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        /* Contenedor de hora y estado */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        /* Hora premium */
        .hora-mx {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 80px;
            padding: 12px 28px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(59, 130, 246, 0.6);
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .hora-mx:hover {
            border-color: rgba(59, 130, 246, 0.9);
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
        }

        .hora-mx span:first-child {
            font-size: 1.4rem;
            animation: pulseSoft 2s infinite;
        }

        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .hora-mx span:nth-child(2) {
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.5px;
            font-size: 1rem;
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.3rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 6px 18px;
            border-radius: 60px;
            letter-spacing: 2px;
            color: #3b82f6;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        /* Puntitos verdes animados - ACTIVE STATUS */
        .active-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 8px 25px;
            border-radius: 60px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(74, 222, 128, 0.3);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #4ade80;
            box-shadow: 0 0 8px #4ade80;
            transition: all 0.2s ease;
        }

        .dot.active {
            animation: pulseGreen 0.8s ease-in-out;
            background-color: #22c55e;
            box-shadow: 0 0 20px #22c55e;
        }

        @keyframes pulseGreen {
            0% {
                transform: scale(1);
                opacity: 0.5;
                box-shadow: 0 0 5px #4ade80;
            }
            50% {
                transform: scale(1.5);
                opacity: 1;
                box-shadow: 0 0 25px #22c55e;
            }
            100% {
                transform: scale(1);
                opacity: 0.8;
                box-shadow: 0 0 10px #4ade80;
            }
        }

        .status-text {
            color: #4ade80;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Botones premium */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 14px 28px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: 85%;
            text-align: center;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            transition: left 0.6s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-4px) scale(1.02);
            filter: brightness(1.08);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-channel {
            background: linear-gradient(135deg, #25D366, #128C7E);
            box-shadow: 0 5px 25px rgba(37, 211, 102, 0.4);
        }

        .btn-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 5px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-custom {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 5px 25px rgba(245, 158, 11, 0.4);
        }

        .btn-staff {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 5px 25px rgba(239, 68, 68, 0.4);
        }

        .btn-registro {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            box-shadow: 0 5px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-sugerencia {
            background: linear-gradient(135deg, #ec489a, #db2777);
            box-shadow: 0 5px 25px rgba(236, 72, 153, 0.4);
        }

        .btn-comandos {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            box-shadow: 0 5px 25px rgba(20, 184, 166, 0.4);
        }

        /* Footer premium */
        .footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container {
                padding: 0 5px;
            }
            
            .main-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .glow-text {
                font-size: 1.2rem;
            }
            
            .avatar {
                width: 55px;
                height: 55px;
            }
            
            .btn {
                width: 95%;
                font-size: 0.95rem;
                padding: 12px 18px;
            }
            
            #hora {
                font-size: 1rem;
            }
            
            .dot {
                width: 8px;
                height: 8px;
            }
        }
    </style>
</head>
<body>
    <!-- Fondo premium -->
    <div class="animated-bg" id="animatedBg"></div>
    <div class="nebula"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="main-card">
            <h1>✨ Bienvenido(a) a Moonlight Staff ✨</h1>
            
            <div class="status-container">
                <div class="hora-mx">
                    <span>🌙</span>
                    <span>México</span>
                    <span id="hora">--:--:--</span>
                </div>
                
                <!-- Puntitos verdes animados secuencialmente -->
                <div class="active-status">
                    <div class="dot" id="dot1"></div>
                    <div class="dot" id="dot2"></div>
                    <div class="dot" id="dot3"></div>
                    <span class="status-text">ACTIVO</span>
                </div>
            </div>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn btn-channel" target="_blank">
                     Channel
                </a>
                <a href="info.html" class="btn btn-info">
                     Información
                </a>
                <a href="custom.html" class="btn btn-custom">
                     Personalizar
                </a>
                <a href="staff.html" class="btn btn-staff">
                     Staff
                </a>
                <a href="registro.html" class="btn btn-registro">
                     Registro
                </a>
                <a href="sugerencias.html" class="btn btn-sugerencia">
                     Sugerencia
                </a>
                <a href="comandos.html" class="btn btn-comandos">
                     Comandos
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
            <p style="font-size: 0.7rem; margin-top: 8px;">© 2026 - Gracias por apoyar nuestros bots</p>
        </div>
    </div>

    <script>
        // Hora de Mérida
        function actualizarHoraMerida() {
            const ahora = new Date();
            const opciones = {
                timeZone: 'America/Merida',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const horaMerida = ahora.toLocaleTimeString('es-MX', opciones);
            document.getElementById('hora').textContent = horaMerida;
        }
        
        actualizarHoraMerida();
        setInterval(actualizarHoraMerida, 1000);

        // ========== PUNTITOS VERDES ANIMADOS ==========
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');
        
        let activeIndex = 0;
        const dots = [dot1, dot2, dot3];
        
        function animateDots() {
            // Quitar clase active de todos
            dots.forEach(dot => {
                dot.classList.remove('active');
            });
            
            // Agregar clase active al actual
            dots[activeIndex].classList.add('active');
            
            // Avanzar al siguiente
            activeIndex = (activeIndex + 1) % dots.length;
        }
        
        // Iniciar animación: cada 800ms cambia el puntito brillante
        animateDots();
        setInterval(animateDots, 800);

        // ========== FONDO PREMIUM CON PARTÍCULAS ==========
        function crearParticulasPremium() {
            const container = document.getElementById('animatedBg');
            const numParticulas = 40;
            
            for (let i = 0; i < numParticulas; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle-premium');
                const size = Math.random() * 150 + 50;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 20}s`;
                particle.style.animationDuration = `${Math.random() * 15 + 15}s`;
                container.appendChild(particle);
            }
        }
        
        crearParticulasPremium();
    </script>
</body>
</html>
