<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0f0c29, #1a1a2e, #16213e);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fondo animado con estrellas */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s infinite alternate;
        }

        @keyframes twinkle {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Partículas flotantes */
        .particle {
            position: fixed;
            background: rgba(255, 215, 0, 0.2);
            border-radius: 50%;
            pointer-events: none;
            animation: float 15s infinite linear;
            z-index: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-20vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 650px;
            margin: 0 auto;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Banner mejorado */
        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 15px 25px;
            border-radius: 80px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .banner:hover {
            border-color: rgba(255, 215, 0, 0.6);
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.15);
            transform: translateY(-2px);
        }

        .avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
        }

        .glow-text {
            font-size: 1.5rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #ffd700, #ffaa00, #fff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 4s linear infinite;
            letter-spacing: 1px;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 300% center; }
        }

        /* Tarjeta principal */
        .main-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .main-card:hover {
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        /* Hora mejorada */
        .hora-mx {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 12px 25px;
            margin-bottom: 35px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .hora-mx:hover {
            border-color: rgba(255, 215, 0, 0.6);
            transform: scale(1.02);
        }

        .hora-mx span:first-child {
            font-size: 1.3rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 15px;
            border-radius: 50px;
            letter-spacing: 1px;
            color: #ffd700;
        }

        /* Botones mejorados */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 18px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            color: white;
            font-size: 1.15rem;
            font-weight: 600;
            padding: 14px 30px;
            border-radius: 60px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            width: 85%;
            text-align: center;
            position: relative;
            overflow: hidden;
            letter-spacing: 0.5px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            filter: brightness(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-channel {
            background: linear-gradient(135deg, #25D366, #128C7E);
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.3);
        }

        .btn-info {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-custom {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-staff {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.3);
        }

        .btn-registro {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            box-shadow: 0 5px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-sugerencia {
            background: linear-gradient(135deg, #ec489a, #db2777);
            box-shadow: 0 5px 20px rgba(236, 72, 153, 0.3);
        }

        .btn-comandos {
            background: linear-gradient(135deg, #14b8a6, #0d9488);
            box-shadow: 0 5px 20px rgba(20, 184, 166, 0.3);
        }

        /* Footer mejorado */
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container {
                padding: 0 5px;
            }
            
            .main-card {
                padding: 30px 20px;
            }
            
            h1 {
                font-size: 1.4rem;
            }
            
            .glow-text {
                font-size: 1.2rem;
            }
            
            .avatar {
                width: 50px;
                height: 50px;
            }
            
            .btn {
                width: 95%;
                font-size: 1rem;
                padding: 12px 20px;
            }
            
            #hora {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- Fondo de estrellas -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="main-card">
            <h1>✨ Bienvenido(a) a Moonlight Staff ✨</h1>
            
            <div class="hora-mx">
                <span>🌙</span>
                <span>Mérida, Yucatán</span>
                <span id="hora">--:--:--</span>
            </div>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn btn-channel" target="_blank">
                    📱 Channel
                </a>
                <a href="info.html" class="btn btn-info">
                    ℹ️ Información
                </a>
                <a href="custom.html" class="btn btn-custom">
                    ⚙️ Personalizar
                </a>
                <a href="staff.html" class="btn btn-staff">
                    👥 Staff
                </a>
                <a href="registro.html" class="btn btn-registro">
                    📝 Registro
                </a>
                <a href="sugerencias.html" class="btn btn-sugerencia">
                    💡 Sugerencia
                </a>
                <a href="comandos.html" class="btn btn-comandos">
                    📋 Comandos
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
            <p style="font-size: 0.7rem; margin-top: 8px;">© 2025 - Todos los derechos reservados</p>
        </div>
    </div>

    <script>
        // Hora de Mérida
        function actualizarHoraMerida() {
            const ahora = new Date();
            const opciones = {
                timeZone: 'America/Merida',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const horaMerida = ahora.toLocaleTimeString('es-MX', opciones);
            document.getElementById('hora').textContent = horaMerida;
        }
        
        actualizarHoraMerida();
        setInterval(actualizarHoraMerida, 1000);

        // Generar estrellas
        function crearEstrellas() {
            const starsContainer = document.getElementById('stars');
            const numEstrellas = 150;
            
            for (let i = 0; i < numEstrellas; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                starsContainer.appendChild(star);
            }
        }

        // Generar partículas flotantes
        function crearParticulas() {
            const numParticulas = 20;
            
            for (let i = 0; i < numParticulas; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 15}s`;
                particle.style.animationDuration = `${Math.random() * 10 + 10}s`;
                document.body.appendChild(particle);
            }
        }

        crearEstrellas();
        crearParticulas();
    </script>
</body>
</html>
