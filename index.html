<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlight Staff</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 60px;
            backdrop-filter: blur(5px);
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .glow-text {
            font-size: 1.3rem;
            font-weight: bold;
            background: linear-gradient(45deg, #fff, #ffd700, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: white;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 80%;
            text-align: center;
        }

        .btn-info {
            background: linear-gradient(45deg, #667eea, #764ba2);
        }

        .btn-custom {
            background: linear-gradient(45deg, #f59e0b, #d97706);
        }

        .btn:hover {
            transform: scale(1.02);
        }

        /* Info extra: contador y hora */
        .info-extra {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50px;
            padding: 12px 20px;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 0.85rem;
        }

        .visitas {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffd700;
        }

        .visitas span:first-child {
            font-size: 1.2rem;
        }

        .visitas-count {
            font-weight: bold;
            font-size: 1.1rem;
            background: rgba(255, 215, 0, 0.2);
            padding: 3px 10px;
            border-radius: 50px;
        }

        .hora-mx {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffd700;
        }

        .hora-mx span:first-child {
            font-size: 1.2rem;
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 10px;
            border-radius: 50px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .heart {
            color: #ff6b6b;
            animation: heartbeat 1.5s infinite;
            display: inline-block;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">✨ Moonlight Staff ✨</span>
        </div>

        <div class="main-card">
            <h1>✨ Bienvenido(a) a Moonlight Staff ✨</h1>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn" target="_blank">
                    📱 Channel
                </a>
                <a href="info.html" class="btn btn-info">
                    ℹ️ Información
                </a>
                <a href="custom.html" class="btn btn-custom">
                    ⚙️ Personalizar
                </a>
            </div>

            <!-- Contador de visitas y hora local México -->
            <div class="info-extra">
                <div class="visitas">
                    <span>👥</span>
                    <span>Visitas:</span>
                    <span class="visitas-count" id="contador">0</span>
                </div>
                <div class="hora-mx">
                    <span>🇲🇽</span>
                    <span>México:</span>
                    <span id="hora">--:--:--</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
        </div>
    </div>

    <script>
        // ========== CONTADOR DE VISITAS ==========
        // Usa localStorage para contar visitas únicas en este navegador
        let visitas = localStorage.getItem('visitasMoonlight');
        
        if (visitas === null) {
            // Primera visita
            visitas = 1;
        } else {
            // Ya había visitado, aumenta el contador
            visitas = parseInt(visitas) + 1;
        }
        
        // Guardar el nuevo contador
        localStorage.setItem('visitasMoonlight', visitas);
        
        // Mostrar en la página
        document.getElementById('contador').textContent = visitas;
        
        // ========== HORA LOCAL DE MÉXICO (CDMX) ==========
        function actualizarHoraMexico() {
            const ahora = new Date();
            
            // Opciones para hora de México (CDMX, UTC-6 en invierno, UTC-5 en verano)
            // Usamos la zona horaria de México (America/Mexico_City)
            const opciones = {
                timeZone: 'America/Mexico_City',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            
            const horaMexico = ahora.toLocaleTimeString('es-MX', opciones);
            document.getElementById('hora').textContent = horaMexico;
        }
        
        // Actualizar hora cada segundo
        actualizarHoraMexico();
        setInterval(actualizarHoraMexico, 1000);
    </script>
</body>
</html>
