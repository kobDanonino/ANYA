<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Moonlight Staff</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #010118, #0a0a2a, #000018);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        /* Fondo espacial con estrellas azuladas */
        .stars-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-big {
            position: absolute;
            background: #aaccff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkleSpace 2s infinite alternate;
            box-shadow: 0 0 3px rgba(100, 150, 255, 0.5);
        }

        .star-small {
            position: absolute;
            background: #88aaff;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkleSpace 3s infinite alternate;
        }

        @keyframes twinkleSpace {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* Nebulosa azul */
        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 680px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Banner azul */
        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            background: rgba(10, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 80px;
            border: 1px solid rgba(100, 150, 255, 0.4);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.2s ease;
        }

        .banner:active {
            transform: scale(0.98);
        }

        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Tarjeta principal */
        .main-card {
            background: rgba(10, 20, 50, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 35px 28px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 28px;
            font-weight: 600;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        /* Contenedor de hora y estado */
        .status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
        }

        /* Hora azul */
        .hora-mx {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 8px 20px;
            width: fit-content;
            margin: 0 auto;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .hora-mx span:first-child {
            font-size: 1.1rem;
        }

        .hora-mx span:nth-child(2) {
            color: #a0c0ff;
            font-size: 0.85rem;
        }

        #hora {
            font-weight: bold;
            font-family: monospace;
            font-size: 1.1rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 3px 12px;
            border-radius: 40px;
            color: #60a5fa;
        }

        /* Puntitos verdes MÁS GRANDES */
        .active-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 16px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #22c55e;
            opacity: 0.4;
            transition: all 0.1s ease;
        }

        .dot.active {
            opacity: 1;
            background-color: #4ade80;
            box-shadow: 0 0 12px #4ade80;
            animation: dotPulse 0.3s ease;
        }

        @keyframes dotPulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.4); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            color: #4ade80;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-left: 6px;
        }

        /* Botones AZULES */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px 24px;
            border-radius: 50px;
            text-decoration: none;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            background: rgba(30, 50, 100, 0.7);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        /* Efecto simple al hover (solo en escritorio) */
        @media (hover: hover) {
            .btn:hover {
                transform: translateY(-1px);
                background: rgba(50, 80, 140, 0.85);
                border-color: rgba(59, 130, 246, 0.9);
            }
        }

        /* Efecto al tocar (móvil) - simple y sin lag */
        .btn:active {
            transform: scale(0.97);
            background: rgba(70, 110, 180, 0.9);
            transition: transform 0.05s ease;
        }

        .btn-icon {
            margin-right: 8px;
            font-size: 1rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 18px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart {
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 550px) {
            body {
                padding: 15px;
            }
            
            .main-card {
                padding: 25px 18px;
            }
            
            h1 {
                font-size: 1.3rem;
                margin-bottom: 22px;
            }
            
            .glow-text {
                font-size: 1.2rem;
            }
            
            .avatar {
                width: 48px;
                height: 48px;
            }
            
            .btn {
                width: 95%;
                font-size: 0.9rem;
                padding: 10px 16px;
            }
            
            #hora {
                font-size: 0.95rem;
            }
            
            .dot {
                width: 9px;
                height: 9px;
            }
            
            .active-status {
                gap: 8px;
                padding: 5px 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Fondo espacial -->
    <div class="stars-space" id="starsSpace"></div>
    <div class="nebula-space"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="main-card">
            <h1>Bienvenido(a) a Moonlight Staff</h1>
            
            <div class="status-container">
                <div class="hora-mx">
                    <span>🌙</span>
                    <span>México</span>
                    <span id="hora">--:--:--</span>
                </div>
                
                <div class="active-status">
                    <div class="dot" id="dot1"></div>
                    <div class="dot" id="dot2"></div>
                    <div class="dot" id="dot3"></div>
                    <span class="status-text">● activo</span>
                </div>
            </div>
            
            <div class="buttons">
                <a href="https://whatsapp.com/channel/0029Vb6qIht5q08ZMPgVrA1y" class="btn" target="_blank">
                    <span class="btn-icon"></span> Channel
                </a>
                <a href="info.html" class="btn">
                    <span class="btn-icon"></span> Información
                </a>
                <a href="custom.html" class="btn">
                    <span class="btn-icon"></span> Personalizar
                </a>
                <a href="staff.html" class="btn">
                    <span class="btn-icon"></span> Staff
                </a>
                <a href="registro.html" class="btn">
                    <span class="btn-icon"></span> Registro
                </a>
                <a href="sugerencias.html" class="btn">
                    <span class="btn-icon"></span> Sugerencia
                </a>
                <a href="comandos.html" class="btn">
                    <span class="btn-icon"></span> Comandos
                </a>
            </div>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
            <p style="font-size: 0.6rem; margin-top: 5px;">© 2026 - Moonlight Studios</p>
        </div>
    </div>

    <script>
        // Hora de Mérida
        function actualizarHoraMerida() {
            const ahora = new Date();
            const opciones = {
                timeZone: 'America/Merida',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            };
            const horaMerida = ahora.toLocaleTimeString('es-MX', opciones);
            const horaElement = document.getElementById('hora');
            if (horaElement) horaElement.textContent = horaMerida;
        }
        
        actualizarHoraMerida();
        setInterval(actualizarHoraMerida, 1000);

        // Puntitos verdes animados secuencialmente
        const dot1 = document.getElementById('dot1');
        const dot2 = document.getElementById('dot2');
        const dot3 = document.getElementById('dot3');
        
        if (dot1 && dot2 && dot3) {
            let activeIndex = 0;
            const dots = [dot1, dot2, dot3];
            
            function animateDots() {
                dots.forEach(dot => {
                    dot.classList.remove('active');
                });
                dots[activeIndex].classList.add('active');
                activeIndex = (activeIndex + 1) % dots.length;
            }
            
            animateDots();
            setInterval(animateDots, 850);
        }

        // Estrellas de fondo azuladas
        function crearEstrellasEspaciales() {
            const container = document.getElementById('starsSpace');
            if (!container) return;
            
            const numEstrellas = 220;
            
            for (let i = 0; i < numEstrellas; i++) {
                const isBig = Math.random() < 0.2;
                const star = document.createElement('div');
                star.classList.add(isBig ? 'star-big' : 'star-small');
                
                const size = isBig ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                star.style.animationDuration = `${Math.random() * 2 + 1.5}s`;
                container.appendChild(star);
            }
        }
        
        crearEstrellasEspaciales();
    </script>
</body>
</html>
