<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Moonlight Staff - Registro</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #010118, #0a0a2a, #000018);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .stars-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-big {
            position: absolute;
            background: #aaccff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkleSpace 2s infinite alternate;
        }

        .star-small {
            position: absolute;
            background: #88aaff;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkleSpace 3s infinite alternate;
        }

        @keyframes twinkleSpace {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            background: rgba(10, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .registro-card {
            background: rgba(10, 20, 50, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 35px 28px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .registro-card h2 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #a0c0ff;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.3);
        }

        .input-group textarea {
            border-radius: 20px;
            resize: vertical;
            min-height: 80px;
        }

        .btn-registrar {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 12px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-registrar:active {
            transform: scale(0.97);
        }

        .estado-bola {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 50px;
            justify-content: center;
        }

        .bola {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .bola.verde {
            background: #4ade80;
            box-shadow: 0 0 12px #4ade80;
        }

        .bola.roja {
            background: #f87171;
            box-shadow: 0 0 12px #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            animation: loading 2s ease forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .hidden { display: none; }

        .info-existente {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .info-existente h3 {
            color: #60a5fa;
            margin-bottom: 15px;
        }

        .info-existente p {
            color: white;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .info-existente strong {
            color: #60a5fa;
        }

        .back-btn {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 25px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: all 0.2s ease;
        }

        .back-btn:active {
            transform: scale(0.97);
        }

        .center {
            text-align: center;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart {
            color: #ff6b6b;
        }

        .custom-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 4000;
            animation: slideDown 0.3s ease;
            font-weight: bold;
            border-left: 4px solid;
            color: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .custom-alert.success { border-left-color: #4ade80; background: #0f172a; }
        .custom-alert.error { border-left-color: #f87171; background: #0f172a; }
        .custom-alert.info { border-left-color: #3b82f6; background: #0f172a; }

        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }

        @media (max-width: 550px) {
            .registro-card { padding: 25px 18px; }
            .glow-text { font-size: 1.2rem; }
            .avatar { width: 48px; height: 48px; }
            .registro-card h2 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="stars-space" id="starsSpace"></div>
    <div class="nebula-space"></div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="registro-card">
            <h2>📝 Registro de Usuario</h2>
            
            <div class="input-group">
                <label>📱 Número (con código país)</label>
                <input type="tel" id="numeroRegistro" placeholder="+52 999 204 2946">
            </div>

            <div class="estado-bola" id="estadoBola" style="display: none;">
                <div class="bola" id="bola"></div>
                <span id="estadoTexto" style="color: white;"></span>
            </div>

            <div class="loading-bar hidden" id="loadingBar">
                <div class="loading-progress"></div>
            </div>

            <div id="camposRegistro" class="hidden">
                <div class="input-group">
                    <label>👤 Nombre</label>
                    <input type="text" id="nombreRegistro" placeholder="Tu nombre completo">
                </div>
                <div class="input-group">
                    <label>📧 Correo</label>
                    <input type="email" id="correoRegistro" placeholder="tu@email.com">
                </div>
                <div class="input-group">
                    <label>📝 Descripción</label>
                    <textarea id="descripcionRegistro" placeholder="Cuéntanos sobre ti..."></textarea>
                </div>
                <button class="btn-registrar" id="btnGuardarRegistro">✅ Guardar Registro</button>
            </div>

            <div id="infoExistente" class="hidden">
                <div class="info-existente">
                    <h3>📋 Tu registro ya existe</h3>
                    <p><strong>👤 Nombre:</strong> <span id="existNombre"></span></p>
                    <p><strong>📧 Correo:</strong> <span id="existCorreo"></span></p>
                    <p><strong>📱 Número:</strong> <span id="existNumero"></span></p>
                    <p><strong>📝 Descripción:</strong> <span id="existDescripcion"></span></p>
                    <p><strong>📅 Registrado:</strong> <span id="existFecha"></span></p>
                </div>
            </div>
        </div>

        <div class="center">
            <a href="index.html" class="back-btn">← Volver al inicio</a>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> para Moonlight Staff</p>
        </div>
    </div>

    <script>
        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.createElement('div');
            alerta.className = `custom-alert ${tipo}`;
            alerta.textContent = mensaje;
            document.body.appendChild(alerta);
            setTimeout(() => alerta.remove(), 3000);
        }

        let registros = JSON.parse(localStorage.getItem('moonlight_registros')) || {};
        const numeroInput = document.getElementById('numeroRegistro');
        const estadoBolaDiv = document.getElementById('estadoBola');
        const bola = document.getElementById('bola');
        const estadoTexto = document.getElementById('estadoTexto');
        const loadingBar = document.getElementById('loadingBar');
        const camposRegistro = document.getElementById('camposRegistro');
        const infoExistente = document.getElementById('infoExistente');
        const btnGuardar = document.getElementById('btnGuardarRegistro');

        numeroInput.addEventListener('input', function() {
            const numero = this.value.trim();
            if (numero.length > 5) verificarRegistro(numero);
            else {
                estadoBolaDiv.style.display = 'none';
                camposRegistro.classList.add('hidden');
                infoExistente.classList.add('hidden');
            }
        });

        function verificarRegistro(numero) {
            if (registros[numero]) {
                bola.className = 'bola roja';
                estadoTexto.textContent = '❌ Este número ya está registrado';
                estadoBolaDiv.style.display = 'flex';
                camposRegistro.classList.add('hidden');
                const registro = registros[numero];
                document.getElementById('existNombre').textContent = registro.nombre;
                document.getElementById('existCorreo').textContent = registro.correo;
                document.getElementById('existNumero').textContent = registro.numero;
                document.getElementById('existDescripcion').textContent = registro.descripcion;
                document.getElementById('existFecha').textContent = registro.fecha;
                infoExistente.classList.remove('hidden');
            } else {
                bola.className = 'bola verde';
                estadoTexto.textContent = '✅ Número disponible para registro';
                estadoBolaDiv.style.display = 'flex';
                infoExistente.classList.add('hidden');
                camposRegistro.classList.remove('hidden');
            }
        }

        btnGuardar.addEventListener('click', function() {
            const numero = numeroInput.value.trim();
            const nombre = document.getElementById('nombreRegistro').value.trim();
            const correo = document.getElementById('correoRegistro').value.trim();
            const descripcion = document.getElementById('descripcionRegistro').value.trim();

            if (!numero || !nombre || !correo || !descripcion) {
                mostrarAlerta('🍃 Por favor, completa todos los campos', 'error');
                return;
            }

            loadingBar.classList.remove('hidden');
            camposRegistro.classList.add('hidden');
            estadoBolaDiv.classList.add('hidden');

            setTimeout(() => {
                registros[numero] = { numero, nombre, correo, descripcion, fecha: new Date().toLocaleString('es-MX') };
                localStorage.setItem('moonlight_registros', JSON.stringify(registros));
                loadingBar.classList.add('hidden');
                mostrarAlerta('⭐ ¡Registro guardado con éxito!', 'success');
                numeroInput.value = '';
                document.getElementById('nombreRegistro').value = '';
                document.getElementById('correoRegistro').value = '';
                document.getElementById('descripcionRegistro').value = '';
                estadoBolaDiv.style.display = 'none';
                camposRegistro.classList.add('hidden');
                infoExistente.classList.add('hidden');
            }, 2000);
        });

        function crearEstrellas() {
            const container = document.getElementById('starsSpace');
            if (!container) return;
            for (let i = 0; i < 180; i++) {
                const isBig = Math.random() < 0.2;
                const star = document.createElement('div');
                star.classList.add(isBig ? 'star-big' : 'star-small');
                const size = isBig ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }
        crearEstrellas();
    </script>
</body>
</html>
