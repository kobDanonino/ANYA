<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Moonlight Staff - Sugerencias</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #010118, #0a0a2a, #000018);
            position: relative;
            overflow-x: hidden;
            padding: 20px;
        }

        .stars-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star-big {
            position: absolute;
            background: #aaccff;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkleSpace 2s infinite alternate;
        }

        .star-small {
            position: absolute;
            background: #88aaff;
            border-radius: 50%;
            opacity: 0.4;
            animation: twinkleSpace 3s infinite alternate;
        }

        @keyframes twinkleSpace {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        .nebula-space {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 50%, rgba(50, 80, 200, 0.12), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .banner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 30px;
            background: rgba(10, 20, 50, 0.5);
            backdrop-filter: blur(12px);
            padding: 12px 22px;
            border-radius: 80px;
            border: 1px solid rgba(59, 130, 246, 0.4);
        }

        .avatar {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .glow-text {
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fff, #3b82f6, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .sugerencia-card {
            background: rgba(10, 20, 50, 0.4);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 35px 28px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        .sugerencia-card h2 {
            color: white;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }

        /* Tarjeta de identidad */
        .identidad-container {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.15), rgba(30, 64, 175, 0.1));
            border-radius: 28px;
            padding: 4px;
            margin-bottom: 25px;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .identidad-card {
            background: rgba(10, 20, 40, 0.6);
            border-radius: 24px;
            padding: 18px 20px;
        }

        .identidad-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .identidad-icono {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        .identidad-titulo {
            flex: 1;
        }

        .identidad-titulo h3 {
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
        }

        .identidad-titulo p {
            color: #60a5fa;
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .identidad-badge {
            background: rgba(59, 130, 246, 0.3);
            border-radius: 50px;
            padding: 6px 14px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .identidad-badge.verified { background: rgba(74, 222, 128, 0.2); color: #4ade80; }
        .identidad-badge.unverified { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .identidad-badge.guest { background: rgba(148, 163, 184, 0.2); color: #94a3b8; }

        .identidad-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
        }

        .usuario-nombre {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 18px;
            border-radius: 50px;
            flex: 1;
        }

        .usuario-nombre span:first-child { font-size: 1.1rem; }
        .usuario-nombre strong { color: #60a5fa; font-size: 0.9rem; font-weight: 600; word-break: break-all; }

        .btn-identidad {
            background: rgba(59, 130, 246, 0.3);
            border: 1px solid rgba(59, 130, 246, 0.5);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-identidad:active { transform: scale(0.95); background: rgba(59, 130, 246, 0.5); }

        .estado-verificacion {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.7rem;
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.3);
        }

        .estado-verificacion.verified { color: #4ade80; }
        .estado-verificacion.unverified { color: #fbbf24; }
        .estado-verificacion.guest { color: #94a3b8; }

        /* Modal de identificación elegante */
        .identidad-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .identidad-modal-content {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-radius: 40px;
            padding: 30px;
            max-width: 380px;
            width: 100%;
            border: 1px solid rgba(59, 130, 246, 0.5);
            text-align: center;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .identidad-modal-content h3 {
            color: #60a5fa;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .identidad-modal-content p {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        .identidad-modal-content input {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 60px;
            color: white;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
        }

        .identidad-modal-content input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-modal-confirm {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
        }

        .btn-modal-cancel {
            background: rgba(100, 100, 100, 0.3);
            color: white;
        }

        .btn-modal-clear {
            background: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .modal-buttons button:active { transform: scale(0.97); }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: #a0c0ff;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(59, 130, 246, 0.4);
            border-radius: 24px;
            color: white;
            font-size: 1rem;
            outline: none;
            resize: vertical;
            min-height: 120px;
        }

        .input-group textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.3);
        }

        .btn-enviar {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #1e40af);
            color: white;
            font-size: 1rem;
            font-weight: bold;
            padding: 14px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-enviar:active { transform: scale(0.97); }

        .loading-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
            margin: 20px 0;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            animation: loading 1.5s ease forwards;
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .hidden { display: none; }

        .back-btn {
            display: inline-block;
            background: rgba(59, 130, 246, 0.3);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            text-decoration: none;
            margin-top: 25px;
            border: 1px solid rgba(59, 130, 246, 0.5);
            transition: all 0.2s ease;
        }

        .back-btn:active { transform: scale(0.97); }
        .center { text-align: center; }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .heart { color: #ff6b6b; }

        .custom-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 4000;
            animation: slideDown 0.3s ease;
            font-weight: bold;
            border-left: 4px solid;
            color: white;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .custom-alert.success { border-left-color: #4ade80; background: #0f172a; }
        .custom-alert.error { border-left-color: #f87171; background: #0f172a; }
        .custom-alert.info { border-left-color: #3b82f6; background: #0f172a; }

        @keyframes slideDown {
            from { top: -50px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }

        @media (max-width: 550px) {
            .sugerencia-card { padding: 25px 18px; }
            .glow-text { font-size: 1.2rem; }
            .avatar { width: 48px; height: 48px; }
            .sugerencia-card h2 { font-size: 1.3rem; }
            .identidad-info { flex-direction: column; align-items: stretch; }
            .btn-identidad { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="stars-space" id="starsSpace"></div>
    <div class="nebula-space"></div>

    <!-- Modal de identificación elegante -->
    <div class="identidad-modal" id="identidadModal">
        <div class="identidad-modal-content">
            <h3>✨ Identifícate</h3>
            <p>Ingresa tu número de WhatsApp para identificar tus sugerencias</p>
            <input type="tel" id="modalNumeroInput" placeholder="+52 999 204 2946" autocomplete="off">
            <div class="modal-buttons">
                <button class="btn-modal-confirm" id="modalConfirmar">✅ Confirmar</button>
                <button class="btn-modal-clear" id="modalLimpiar">🗑️ Borrar</button>
                <button class="btn-modal-cancel" id="modalCancelar">❌ Cancelar</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="banner">
            <img class="avatar" src="https://i.postimg.cc/L57hdhqM/Screenshot-2026-03-22-19-38-30-712-com-whatsapp.png" alt="Moonlight Staff">
            <span class="glow-text">Moonlight Staff</span>
        </div>

        <div class="sugerencia-card">
            <h2>💡 Envíanos tu sugerencia</h2>
            
            <div class="identidad-container">
                <div class="identidad-card">
                    <div class="identidad-header">
                        <div class="identidad-icono">✨</div>
                        <div class="identidad-titulo">
                            <h3>Tu identidad</h3>
                            <p>Así aparecerás en tus sugerencias</p>
                        </div>
                        <div class="identidad-badge" id="estadoBadge">Identidad</div>
                    </div>
                    <div class="identidad-info">
                        <div class="usuario-nombre">
                            <span>👤</span>
                            <strong id="nombreUsuario">Cargando...</strong>
                        </div>
                        <button class="btn-identidad" id="btnCambiarIdentidad">
                            <span>✏️</span> Cambiar
                        </button>
                    </div>
                    <div class="estado-verificacion" id="estadoVerificacion">
                        <span id="estadoIcono">🔄</span>
                        <span id="estadoTexto">Verificando...</span>
                    </div>
                </div>
            </div>
            
            <div class="input-group">
                <label>📝 Tu sugerencia</label>
                <textarea id="sugerenciaTexto" placeholder="Escribe aquí tu sugerencia para mejorar Moonlight Staff..."></textarea>
            </div>

            <div class="loading-bar hidden" id="loadingBar">
                <div class="loading-progress"></div>
            </div>

            <button class="btn-enviar" id="btnEnviarSugerencia">📩 Enviar Sugerencia</button>
        </div>

        <div class="center">
            <a href="index.html" class="back-btn">← Volver al inicio</a>
        </div>

        <div class="footer">
            <p>Hecho con <span class="heart">❤️</span> Moonlight Staff 🎑</p>
        </div>
    </div>

    <script>
        function mostrarAlerta(mensaje, tipo) {
            const alerta = document.createElement('div');
            alerta.className = `custom-alert ${tipo}`;
            alerta.textContent = mensaje;
            document.body.appendChild(alerta);
            setTimeout(() => alerta.remove(), 3000);
        }

        // ========== IDENTIFICACIÓN DE USUARIO ==========
        let numeroUsuario = localStorage.getItem('usuario_sugerencias');
        
        function actualizarInfoUsuario() {
            const registros = JSON.parse(localStorage.getItem('moonlight_registros')) || {};
            const nombreElement = document.getElementById('nombreUsuario');
            const estadoBadge = document.getElementById('estadoBadge');
            const estadoTexto = document.getElementById('estadoTexto');
            const estadoIcono = document.getElementById('estadoIcono');
            const estadoVerificacion = document.getElementById('estadoVerificacion');
            
            if (numeroUsuario && registros[numeroUsuario]) {
                const nombre = registros[numeroUsuario].nombre;
                nombreElement.textContent = nombre;
                estadoBadge.textContent = ' Registrado';
                estadoBadge.className = 'identidad-badge verified';
                estadoIcono.textContent = '';
                estadoTexto.textContent = 'Verificado · Cuenta registrada';
                estadoVerificacion.className = 'estado-verificacion verified';
            } else if (numeroUsuario) {
                nombreElement.textContent = numeroUsuario;
                estadoBadge.textContent = '📱 Invitado';
                estadoBadge.className = 'identidad-badge unverified';
                estadoIcono.textContent = '⚠️';
                estadoTexto.textContent = 'No registrado · Identificado por número';
                estadoVerificacion.className = 'estado-verificacion unverified';
            } else {
                nombreElement.textContent = 'Sin identificar';
                estadoBadge.textContent = '❓ Anónimo';
                estadoBadge.className = 'identidad-badge guest';
                estadoIcono.textContent = '❓';
                estadoTexto.textContent = 'Anónimo · Identifícate para que sepamos quién eres';
                estadoVerificacion.className = 'estado-verificacion guest';
            }
        }
        
        function guardarNumero(numero) {
            if (numero && numero.trim().length > 5) {
                numeroUsuario = numero.trim();
                localStorage.setItem('usuario_sugerencias', numeroUsuario);
                actualizarInfoUsuario();
                mostrarAlerta('✅ Identidad actualizada', 'success');
                return true;
            } else if (numero === '') {
                numeroUsuario = null;
                localStorage.removeItem('usuario_sugerencias');
                actualizarInfoUsuario();
                mostrarAlerta('👤 Ahora eres anónimo', 'info');
                return true;
            }
            return false;
        }

        // Modal elegante
        const modal = document.getElementById('identidadModal');
        const modalInput = document.getElementById('modalNumeroInput');
        
        function abrirModal() {
            modalInput.value = numeroUsuario || '';
            modal.style.display = 'flex';
        }
        
        function cerrarModal() {
            modal.style.display = 'none';
        }
        
        document.getElementById('btnCambiarIdentidad').addEventListener('click', abrirModal);
        
        document.getElementById('modalConfirmar').addEventListener('click', () => {
            const nuevoNumero = modalInput.value.trim();
            if (nuevoNumero && nuevoNumero.length > 5) {
                guardarNumero(nuevoNumero);
                cerrarModal();
            } else if (nuevoNumero === '') {
                guardarNumero('');
                cerrarModal();
            } else {
                mostrarAlerta('⚠️ Ingresa un número válido (mínimo 6 caracteres)', 'error');
            }
        });
        
        document.getElementById('modalLimpiar').addEventListener('click', () => {
            guardarNumero('');
            cerrarModal();
        });
        
        document.getElementById('modalCancelar').addEventListener('click', cerrarModal);
        
        // Cerrar modal al hacer clic fuera
        modal.addEventListener('click', (e) => {
            if (e.target === modal) cerrarModal();
        });
        
        actualizarInfoUsuario();

        // ========== ENVIAR SUGERENCIA ==========
        let sugerencias = JSON.parse(localStorage.getItem('moonlight_sugerencias')) || [];
        const btnEnviar = document.getElementById('btnEnviarSugerencia');
        const sugerenciaTexto = document.getElementById('sugerenciaTexto');
        const loadingBar = document.getElementById('loadingBar');

        btnEnviar.addEventListener('click', function() {
            const texto = sugerenciaTexto.value.trim();
            if (!texto) {
                mostrarAlerta('⚠️ Por favor, escribe una sugerencia', 'error');
                return;
            }
            
            let nombreUsuario = 'Anónimo';
            if (numeroUsuario) {
                const registros = JSON.parse(localStorage.getItem('moonlight_registros')) || {};
                if (registros[numeroUsuario]) {
                    nombreUsuario = registros[numeroUsuario].nombre;
                } else {
                    nombreUsuario = numeroUsuario;
                }
            }

            loadingBar.classList.remove('hidden');
            btnEnviar.disabled = true;

            setTimeout(() => {
                sugerencias.push({ 
                    id: Date.now(), 
                    texto: texto, 
                    fecha: new Date().toLocaleString('es-MX'),
                    usuario: nombreUsuario,
                    numero: numeroUsuario || null
                });
                localStorage.setItem('moonlight_sugerencias', JSON.stringify(sugerencias));
                loadingBar.classList.add('hidden');
                btnEnviar.disabled = false;
                mostrarAlerta('✅ ¡Sugerencia enviada con éxito!', 'success');
                sugerenciaTexto.value = '';
            }, 1500);
        });

        // ========== ESTRELLAS DE FONDO ==========
        function crearEstrellas() {
            const container = document.getElementById('starsSpace');
            if (!container) return;
            for (let i = 0; i < 180; i++) {
                const isBig = Math.random() < 0.2;
                const star = document.createElement('div');
                star.classList.add(isBig ? 'star-big' : 'star-small');
                const size = isBig ? Math.random() * 3 + 2 : Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(star);
            }
        }
        crearEstrellas();

        const style = document.createElement('style');
        style.textContent = `@keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 20px; opacity: 1; } } .custom-alert { animation: slideDown 0.3s ease; }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
